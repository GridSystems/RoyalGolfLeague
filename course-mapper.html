<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Royal Golf Club — Course Mapper</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #1a1a2e; color: #eee; }
    #topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #16213e; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #topbar h1 { font-size: 15px; font-weight: 700; color: #e94560; white-space: nowrap; }
    #status { font-size: 13px; color: #aaa; flex: 1; }
    #exportBtn { padding: 7px 16px; border-radius: 6px; border: none; background: #444; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #exportBtn.ready { background: #2ecc71; color: #000; cursor: pointer; animation: pulse 1.5s infinite; }
    #addPinBtn { padding: 7px 14px; border-radius: 6px; border: 1px solid #555; background: none; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #addPinBtn.active { background: #f39c12; color: #000; border-color: #f39c12; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.75} }
    #map.pin-mode { cursor: crosshair !important; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 254px; background: #16213e; border-right: 1px solid #0f3460; overflow-y: auto; flex-shrink: 0; }
    #sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; padding: 9px 12px 6px; border-bottom: 1px solid #0f3460; }
    .hole-row { display: flex; align-items: center; padding: 5px 10px; border-bottom: 1px solid #0f346020; }
    .hole-num { font-size: 13px; font-weight: 700; color: #e94560; width: 24px; }
    .hole-indicators { display: flex; gap: 5px; flex: 1; }
    .indicator { font-size: 11px; padding: 2px 7px; border-radius: 3px; font-weight: 700; cursor: default; }
    .ind-tee.set { background: #2196F3; color: #fff; cursor: pointer; }
    .ind-tee.unset { background: #2a2a3e; color: #555; }
    .ind-green.set { background: #e94560; color: #fff; cursor: pointer; }
    .ind-green.unset { background: #2a2a3e; color: #555; }
    .hole-clears { display: flex; gap: 3px; }
    .clr { font-size: 9px; background: none; border: 1px solid #444; color: #666; border-radius: 3px; padding: 1px 4px; cursor: pointer; }
    .clr:hover { border-color: #e94560; color: #e94560; }
    #map { flex: 1; }
    #panel { position: fixed; z-index: 1001; background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 14px 16px; width: 230px; box-shadow: 0 6px 24px rgba(0,0,0,.7); display: none; }
    #panel h3 { font-size: 13px; font-weight: 700; color: #e94560; margin-bottom: 3px; }
    #panel-meta { font-size: 11px; color: #777; margin-bottom: 10px; }
    .prow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .prow label { font-size: 12px; font-weight: 600; width: 42px; }
    .prow select { flex: 1; background: #0f3460; color: #eee; border: 1px solid #444; border-radius: 4px; padding: 4px 6px; font-size: 12px; }
    .prow button { padding: 4px 10px; border-radius: 4px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .btn-tee { background: #2196F3; color: #fff; }
    .btn-green { background: #e94560; color: #fff; }
    #panel-close { width: 100%; margin-top: 4px; padding: 5px; border-radius: 4px; border: 1px solid #444; background: none; color: #888; font-size: 12px; cursor: pointer; }
    #panel-close:hover { background: #252545; }
    #legend { position: fixed; bottom: 12px; right: 12px; z-index: 1000; background: #16213ecc; border: 1px solid #0f3460; border-radius: 6px; padding: 8px 12px; font-size: 11px; line-height: 1.8; }
    #legend span { display: inline-block; width: 12px; height: 12px; border-radius: 50%; vertical-align: middle; margin-right: 5px; border: 1px solid #fff; }
  </style>
</head>
<body>
<div id="topbar">
  <h1>🏌️ Royal GC — Course Mapper</h1>
  <div id="status">0 / 18 holes mapped</div>
  <button id="addPinBtn" onclick="togglePinMode()">📍 Add Pin</button>
  <button id="exportBtn" onclick="exportJson()">Export JSON</button>
</div>
<div id="main">
  <div id="sidebar">
    <h2>Holes</h2>
    <div id="holeList"></div>
  </div>
  <div id="map"></div>
</div>

<div id="panel">
  <h3 id="panel-title">Stay</h3>
  <div id="panel-meta"></div>
  <div class="prow">
    <label style="color:#2196F3">Tee</label>
    <select id="tee-sel"></select>
    <button class="btn-tee" onclick="doAssign('tee')">Set</button>
  </div>
  <div class="prow">
    <label style="color:#e94560">Green</label>
    <select id="grn-sel"></select>
    <button class="btn-green" onclick="doAssign('green')">Set</button>
  </div>
  <button id="panel-close" onclick="closePanel()">✕ Close</button>
</div>

<div id="legend">
  <span style="background:#888"></span> Unassigned<br>
  <span style="background:#2196F3"></span> Tee<br>
  <span style="background:#e94560"></span> Green<br>
  <span style="background:#9b59b6"></span> Tee + Green (par 3)<br>
  <span style="background:#f39c12"></span> Custom pin
</div>

// Combined accessor — GPS stays (0..N-1) then custom pins (N..)
function getStay(i) {

}
function stayCount() { return STAYS.length + customPins.length; }

STAYS.forEach((stay, i) => addMarker(stay, i));
// Restore any saved custom pins
customPins.forEach((pin, j) => addMarker(pin, STAYS.length + j));

map.on('click', e => {
  if (pinMode) {
    const {lat, lng} = e.latlng;
    customPins.push({ lat, lon: lng, custom: true });
    const idx = STAYS.length + customPins.length - 1;
    addMarker(customPins[customPins.length - 1], idx);
    saveAll();
    renderHoleList();
    openPanel(idx);
  } else {
    closePanel();
  }
});

function addMarker(stay, i) {
  const label = stay.custom
    ? `Custom pin #${i - STAYS.length + 1}`
    : `#${i+1} @ ${stay.time} (${stay.duration}s)`;
  const m = L.circleMarker([stay.lat, stay.lon], markerOpts(i)).addTo(map);
  m.bindTooltip(label, { permanent: false, direction: 'top' });
  m.on('click', e => { L.DomEvent.stopPropagation(e); openPanel(i); });
  markers[i] = m;
}

// ── Add-pin mode ──────────────────────────────────────────────────────────
function togglePinMode() {
  pinMode = !pinMode;
  document.getElementById('addPinBtn').classList.toggle('active', pinMode);
  document.getElementById('map').classList.toggle('pin-mode', pinMode);
  if (pinMode) closePanel();
}

    ? (both ? '#9b59b6' : a.tee ? '#2196F3' : a.green ? '#e94560' : '#f39c12')
    : (both ? '#9b59b6' : a.tee ? '#2196F3' : a.green ? '#e94560' : '#888888');
  const sel = i === selectedIdx;
  return {
    radius: sel ? 11 : 8,
    fillColor: color,
    color: sel ? '#ffd700' : '#fff',
    weight: sel ? 3 : 1.5,
    fillOpacity: 0.92
  };
}

function refreshMarkers() {
  markers.forEach((m, i) => m.setStyle(markerOpts(i)).setRadius(markerOpts(i).radius));
}

// ── Panel ──────────────────────────────────────────────────────────────────
function buildSel(id, current) {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">— select —</option>';
  for (let h = 1; h <= 18; h++) {
    const o = document.createElement('option');
    o.value = h;
    o.textContent = 'Hole ' + h;
    if (current === h) o.selected = true;
    sel.appendChild(o);
  }
}

function openPanel(i) {
  selectedIdx = i;
  const stay = getStay(i);
  const a = assignments[i] || {};
  document.getElementById('panel-title').textContent = stay.custom
    ? 'Custom pin #' + (i - STAYS.length + 1)
    : 'Stay #' + (i + 1);
  document.getElementById('panel-meta').textContent = stay.custom
    ? stay.lat.toFixed(6) + ', ' + stay.lon.toFixed(6)
    : 'Time: ' + stay.time + ' · Duration: ' + stay.duration + 's';
  buildSel('tee-sel', a.tee || null);
  buildSel('grn-sel', a.green || null);

  // Position panel near marker
  const pt = map.latLngToContainerPoint([stay.lat, stay.lon]);
  const mapRect = document.getElementById('map').getBoundingClientRect();
  const panel = document.getElementById('panel');
  panel.style.display = 'block';
  let left = mapRect.left + pt.x + 18;
  let top  = mapRect.top  + pt.y - 60;
  if (left + 240 > window.innerWidth - 10) left = mapRect.left + pt.x - 248;
  if (top < 60) top = 60;
  if (top + 195 > window.innerHeight - 10) top = window.innerHeight - 205;
  panel.style.left = left + 'px';
  panel.style.top  = top  + 'px';

  refreshMarkers();
}

function closePanel() {
  selectedIdx = null;
  document.getElementById('panel').style.display = 'none';
  refreshMarkers();
}

function doAssign(type) {
  if (selectedIdx === null) return;
  const selId = type === 'tee' ? 'tee-sel' : 'grn-sel';
  const hole = parseInt(document.getElementById(selId).value);
  if (!hole) { alert('Select a hole number first.'); return; }

  // Clear any existing assignment for this hole+type
  Object.keys(assignments).forEach(k => {
    if (assignments[k] && assignments[k][type] === hole) {
      delete assignments[k][type];
      if (!assignments[k].tee && !assignments[k].green) delete assignments[k];
    }
  });

  if (!assignments[selectedIdx]) assignments[selectedIdx] = {};
  assignments[selectedIdx][type] = hole;
  save();

  // Refresh panel selects to reflect saved state
  const a = assignments[selectedIdx] || {};
  buildSel('tee-sel', a.tee || null);
  buildSel('grn-sel', a.green || null);

  refreshMarkers();
  renderHoleList();
}

function clearHoleType(type, hole) {
  Object.keys(assignments).forEach(k => {
    if (assignments[k] && assignments[k][type] === hole) {
      delete assignments[k][type];
      if (!assignments[k].tee && !assignments[k].green) delete assignments[k];
    }
  });
  save();
  refreshMarkers();
  renderHoleList();
  // If panel open and was showing this stay, refresh it
  if (selectedIdx !== null) {
    const a = assignments[selectedIdx] || {};
    buildSel('tee-sel', a.tee || null);
    buildSel('grn-sel', a.green || null);
  }
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function getAssignedIdx(type, hole) {
  const found = Object.entries(assignments).find(([k, v]) => v && v[type] === hole);
  return found ? parseInt(found[0]) : null;
}

function renderHoleList() {
  const list = document.getElementById('holeList');
  list.innerHTML = '';
  let done = 0;
  for (let h = 1; h <= 18; h++) {
    const teeIdx   = getAssignedIdx('tee', h);
    const greenIdx = getAssignedIdx('green', h);
    if (teeIdx !== null && greenIdx !== null) done++;
    const row = document.createElement('div');
    row.className = 'hole-row';
    row.innerHTML =
      '<div class="hole-num">' + h + '</div>' +
      '<div class="hole-indicators">' +
        '<span class="indicator ind-tee ' + (teeIdx !== null ? 'set' : 'unset') + '"' +
          (teeIdx !== null ? ' title="Stay #'+(teeIdx+1)+'" onclick="focusStay('+teeIdx+')"' : '') +
          '>T' + (teeIdx !== null ? ' '+(teeIdx+1) : '') + '</span>' +
        '<span class="indicator ind-green ' + (greenIdx !== null ? 'set' : 'unset') + '"' +
          (greenIdx !== null ? ' title="Stay #'+(greenIdx+1)+'" onclick="focusStay('+greenIdx+')"' : '') +
          '>G' + (greenIdx !== null ? ' '+(greenIdx+1) : '') + '</span>' +
      '</div>' +
      '<div class="hole-clears">' +
        (teeIdx !== null ? '<button class="clr" onclick="clearHoleType(\'tee\','+h+')">✕T</button>' : '') +
        (greenIdx !== null ? '<button class="clr" onclick="clearHoleType(\'green\','+h+')">✕G</button>' : '') +
      '</div>';
    list.appendChild(row);
  }
  document.getElementById('status').textContent = done + ' / 18 holes mapped';
  const btn = document.getElementById('exportBtn');
  btn.classList.toggle('ready', done === 18);
  btn.textContent = done === 18 ? 'Export JSON' : 'Export JSON (' + done + '/18)';
}

function focusStay(idx) {
  const s = getStay(idx);
  map.flyTo([s.lat, s.lon], 18, { animate: true, duration: 0.8 });
  setTimeout(() => openPanel(idx), 300);
}

// ── Persistence ────────────────────────────────────────────────────────────
function saveAll() {
  localStorage.setItem('rgcCourseMapper', JSON.stringify(assignments));
  localStorage.setItem('rgcCourseMapperPins', JSON.stringify(customPins));
}
function save() { saveAll(); }

// ── Export ─────────────────────────────────────────────────────────────────
function exportJson() {
  const missing = [];
  const holes = [];
  for (let h = 1; h <= 18; h++) {
    const teeIdx   = getAssignedIdx('tee', h);
    const greenIdx = getAssignedIdx('green', h);
    if (teeIdx === null || greenIdx === null) missing.push(h);
    const teeStay   = teeIdx   !== null ? getStay(teeIdx)   : null;
    const greenStay = greenIdx !== null ? getStay(greenIdx) : null;
    holes.push({
      hole:  h,
      tee:   teeStay   ? { lat: teeStay.lat,   lng: teeStay.lon   } : null,
      green: greenStay ? { lat: greenStay.lat, lng: greenStay.lon } : null
    });
  }
  if (missing.length > 0) {
    const ok = confirm(
      'Holes ' + missing.join(', ') + ' are incomplete.\n' +
      'Export anyway with null for missing positions?'
    );
    if (!ok) return;
  }
  const blob = new Blob([JSON.stringify({ holes }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'royal_gc_holes.json';
  a.click();
}

// ── Init ───────────────────────────────────────────────────────────────────
renderHoleList();
</script>
</body>
</html>
